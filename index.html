<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hitansh Cab Service</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}.top{background:#0b3d91;color:#fff;padding:16px;text-align:center}
.container{max-width:700px;margin:auto;padding:16px}

button{background:#25D366;color:#fff;border:0;border-radius:6px}

<div class="top"><h2>🚖 Hitansh Cab Service</h2><a href="tel:6353886346" style="color:white">📞 6353886346</a></div>
<div class="container">
<form onsubmit="sendWhatsApp();return false;">
<input id="name" placeholder="Name" required>

<h3>Fare List</h3>
<table><tr><th>Route</th><th>Sedan</th><th>SUV</th></tr>
<tr><td>Vadodara → Ahmedabad</td><td>1799</td><td>2399</td></tr>
<tr><td>Vadodara → Surat</td><td>2499</td><td>2999</td></tr>
<tr><td>Vadodara → Gandhinagar</td><td>1999</td><td>2699</td></tr>
<tr><td>Vadodara → Rajkot</td><td>4399</td><td>5999</td></tr>
<tr><td>Vadodara → Jamnagar</td><td>7000</td><td>8000</td></tr>

<tr><td>Vadodara → Somnath</td><td>8000</td><td>9000</td></tr></table>
</div>
<script>

let m=`🚖 *New Cab Booking*%0A👤 Name: ${name.value}%0A📱 Mobile: ${mobile.value}%0A📍 Pickup: ${pickup.value}%0A📍 Drop: ${drop.value}%0A📅 Date: ${date.value}%0A⏰ Time: ${time.value}%0A🚗 Trip: ${tripType.value}%0A🔁 Return: ${returnLocation.value}%0A🚘 Car: ${car.value}`;
window.open("https://wa.me/916353886346?text="+m,"_blank");
}
</script></body></html>
