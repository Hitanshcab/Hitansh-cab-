<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hitansh Cab</title></head>
<body style="font-family:Arial;max-width:700px;margin:auto;padding:20px">
<h2>🚖 Hitansh Cab Service</h2>
<form onsubmit="return sendWhatsApp()">
<input id="name" placeholder="Name" required><br><br>
<input id="mobile" placeholder="Mobile" required><br><br>
<input id="pickup" placeholder="Pickup" required><br><br>
<input id="drop" placeholder="Drop" required><br><br>
<input id="date" type="date" required><br><br>
<input id="time" type="time" required><br><br>
<select id="tripType"><option>One Way</option><option>Round Trip</option></select><br><br>
<select id="car"><option>Sedan</option><option>SUV</option></select><br><br>
<button type="submit">Book on WhatsApp</button></form>
<script>
function sendWhatsApp(){
var n=document.getElementById('name').value;
var m=document.getElementById('mobile').value;
var p=document.getElementById('pickup').value;
var d=document.getElementById('drop').value;
var dt=document.getElementById('date').value;
var t=document.getElementById('time').value;
var tr=document.getElementById('tripType').value;
var c=document.getElementById('car').value;
var msg="New Cab Booking%0AName:"+n+"%0AMobile:"+m+"%0APickup:"+p+"%0ADrop:"+d+"%0ADate:"+dt+"%0ATime:"+t+"%0ATrip:"+tr+"%0ACar:"+c;
window.open("https://wa.me/916353886346?text="+msg,"_blank");
return false;
}
</script></body></html>
